<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 2em;
            font-family: monospace;
        }
        #content {
            text-align: left;
        }
        .comments-section {
            margin-top: 2em;
        }
        .comment-box {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }
        .btn {
            padding: 10px 15px;
            background-color: #00ffdd;
            color: black;
            border: none;
            cursor: pointer;
            margin-right: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="content"></div>
    <div class="actions" style="margin-top: 20px;">
        <button class="btn" onclick="showCommentBox()">Comment</button>
        <button class="btn" onclick="alert('Contact me on djdadaisdanger@gmail.com')">Contribute</button>
    </div>
    <div id="comment-box-container" style="display: none; margin-top: 20px;">
        <textarea id="comment-input" class="comment-box" rows="4" placeholder="Enter your comment..."></textarea>
        <button class="btn" onclick="submitComment()">Submit</button>
    </div>
    <div class="comments-section">
        <h3>Comments</h3>
        <div id="comments-list"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <script type="module">
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { addDoc, getDocs, deleteDoc, updateDoc, query, orderBy, collectionGroup, serverTimestamp, doc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { app, db, commentsCollection } from "./firebase-init.js";

        const auth = getAuth(app);

        signInAnonymously(auth).catch((error) => {
            console.error("Error signing in anonymously: ", error);
        });

        fetch('research.md')
            .then(response => response.text())
            .then(text => {
                const dirtyHTML = marked.parse(text);
                const cleanHTML = DOMPurify.sanitize(dirtyHTML);
                document.getElementById('content').innerHTML = cleanHTML;
            });
        
        window.showCommentBox = function() {
            const commentBox = document.getElementById('comment-box-container');
            commentBox.style.display = commentBox.style.display === 'none' ? 'block' : 'none';
        }

        window.submitComment = function() {
            const commentInput = document.getElementById('comment-input');
            const commentText = commentInput.value;
            const user = auth.currentUser;
            if (commentText.trim() !== '' && user) {
                addDoc(commentsCollection, {
                    text: commentText,
                    authorId: user.uid,
                    timestamp: serverTimestamp()
                })
                .then(() => {
                    commentInput.value = '';
                    showCommentBox();
                    loadComments();
                })
                .catch(error => {
                    console.error("Error adding document: ", error);
                });
            }
        }

        window.deleteComment = function(id) {
            deleteDoc(doc(commentsCollection, id)).then(() => {
                loadComments();
            }).catch((error) => {
                console.error("Error removing document: ", error);
            });
        }

        window.editComment = function(id, oldText) {
            const newText = prompt("Edit your comment:", oldText);
            if (newText && newText.trim() !== '') {
                updateDoc(doc(commentsCollection, id), {
                    text: newText
                })
                .then(() => {
                    loadComments();
                })
                .catch((error) => {
                    console.error("Error updating document: ", error);
                });
            }
        }

        window.replyToComment = function(id) {
            const replyText = prompt("Write your reply:");
            const user = auth.currentUser;
            if (replyText && replyText.trim() !== '' && user) {
                const reply = {
                    text: replyText,
                    authorId: user.uid,
                    timestamp: serverTimestamp()
                };
                addDoc(collection(doc(commentsCollection, id), "replies"), reply)
                .then(() => {
                    loadComments();
                })
                .catch((error) => {
                    console.error("Error adding reply: ", error);
                });
            }
        }

        function loadComments() {
            const commentsQuery = getDocs(query(commentsCollection, orderBy("timestamp", "desc")));
            const repliesQuery = getDocs(query(collectionGroup(db, "replies"), orderBy("timestamp", "asc")));

            return Promise.all([commentsQuery, repliesQuery]).then(([commentsSnapshot, repliesSnapshot]) => {
                const commentsList = document.getElementById('comments-list');
                commentsList.innerHTML = '';

                const user = auth.currentUser;
                const repliesMap = new Map();
                repliesSnapshot.forEach((replyDoc) => {
                    const reply = replyDoc.data();
                    // Ref logic: replyDoc.ref.parent.parent.id in v9 is the same but accessed via properties or path
                    const parentId = replyDoc.ref.parent.parent.id;
                    if (!repliesMap.has(parentId)) {
                        repliesMap.set(parentId, []);
                    }
                    repliesMap.get(parentId).push(reply);
                });

                commentsSnapshot.forEach((docSnap) => {
                    const comment = docSnap.data();
                    const commentElement = document.createElement('div');
                    commentElement.classList.add('comment-box');
                    
                    const commentText = document.createElement('p');
                    commentText.textContent = comment.text;
                    commentElement.appendChild(commentText);

                    const actions = document.createElement('div');
                    const replyButton = document.createElement('button');
                    replyButton.textContent = "Reply";
                    replyButton.classList.add('btn');
                    replyButton.onclick = () => window.replyToComment(docSnap.id);
                    actions.appendChild(replyButton);
                    
                    if (user && user.uid === comment.authorId) {
                        const editButton = document.createElement('button');
                        editButton.textContent = "Edit";
                        editButton.classList.add('btn');
                        editButton.onclick = () => window.editComment(docSnap.id, comment.text);
                        actions.appendChild(editButton);

                        const deleteButton = document.createElement('button');
                        deleteButton.textContent = "Delete";
                        deleteButton.classList.add('btn');
                        deleteButton.onclick = () => window.deleteComment(docSnap.id);
                        actions.appendChild(deleteButton);
                    }
                    
                    commentElement.appendChild(actions);

                    // Load replies
                    const repliesList = document.createElement('div');
                    repliesList.style.marginLeft = "20px";
                    commentElement.appendChild(repliesList);

                    const replies = repliesMap.get(docSnap.id) || [];
                    replies.forEach((reply) => {
                        const replyElement = document.createElement('div');
                        replyElement.classList.add('comment-box');
                        replyElement.textContent = reply.text;
                        repliesList.appendChild(replyElement);
                    });

                    commentsList.appendChild(commentElement);
                });
            }).catch((error) => {
                console.error("Error loading comments and replies: ", error);
            });
        }

        let isInitialLoad = true;
        onAuthStateChanged(auth, (user) => {
            if (isInitialLoad) {
                loadComments();
                isInitialLoad = false;
            }
        });
    </script>
</body>
</html>
