<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 2em;
            font-family: monospace;
        }
        #content {
            text-align: left;
        }
        .comments-section {
            margin-top: 2em;
        }
        .comment-box {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #00e5ff;
            color: #000012;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.3s ease;
            border: none;
            cursor: pointer;
            margin-right: 10px;
            font-family: monospace;
        }
        .btn:hover {
            background-color: #ffffff;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="content"></div>
    <div class="actions" style="margin-top: 20px;">
        <button class="btn" onclick="showCommentBox()">Comment</button>
        <button class="btn" onclick="alert('Contact me on djdadaisdanger@gmail.com')">Contribute</button>
    </div>
    <div id="comment-box-container" style="display: none; margin-top: 20px;">
        <textarea id="comment-input" class="comment-box" rows="4" placeholder="Enter your comment..."></textarea>
        <button class="btn" onclick="submitComment()">Submit</button>
    </div>
    <div class="comments-section">
        <h3>Comments</h3>
        <div id="comments-list"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script src="firebase-init.js"></script>

    <script>
        firebase.auth().signInAnonymously().catch((error) => {
            console.error("Error signing in anonymously: ", error);
        });

        fetch('research.md')
            .then(response => response.text())
            .then(text => {
                const dirtyHTML = marked.parse(text);
                const cleanHTML = DOMPurify.sanitize(dirtyHTML);
                document.getElementById('content').innerHTML = cleanHTML;
            });
        
        function showCommentBox() {
            const commentBox = document.getElementById('comment-box-container');
            commentBox.style.display = commentBox.style.display === 'none' ? 'block' : 'none';
        }

        function submitComment() {
            const commentInput = document.getElementById('comment-input');
            const commentText = commentInput.value;
            const user = firebase.auth().currentUser;
            if (commentText.trim() !== '' && user) {
                commentsCollection.add({
                    text: commentText,
                    authorId: user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => {
                    commentInput.value = '';
                    showCommentBox();
                })
                .catch(error => {
                    console.error("Error adding document: ", error);
                });
            }
        }

        function deleteComment(id) {
            commentsCollection.doc(id).delete().catch((error) => {
                console.error("Error removing document: ", error);
            });
        }

        function editComment(id, oldText) {
            const newText = prompt("Edit your comment:", oldText);
            if (newText && newText.trim() !== '') {
                commentsCollection.doc(id).update({
                    text: newText
                })
                .catch((error) => {
                    console.error("Error updating document: ", error);
                });
            }
        }

        function replyToComment(id) {
            const replyText = prompt("Write your reply:");
            const user = firebase.auth().currentUser;
            if (replyText && replyText.trim() !== '' && user) {
                const reply = {
                    text: replyText,
                    authorId: user.uid,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };
                commentsCollection.doc(id).collection("replies").add(reply)
                .catch((error) => {
                    console.error("Error adding reply: ", error);
                });
            }
        }

        let localComments = [];
        let localRepliesMap = new Map();

        function renderComments() {
            const commentsList = document.getElementById('comments-list');
            commentsList.innerHTML = '';
            const user = firebase.auth().currentUser;

            localComments.forEach((doc) => {
                const comment = doc.data();
                const commentElement = document.createElement('div');
                commentElement.classList.add('comment-box');

                const commentText = document.createElement('p');
                commentText.textContent = comment.text;
                commentElement.appendChild(commentText);

                const actions = document.createElement('div');
                const replyButton = document.createElement('button');
                replyButton.textContent = "Reply";
                replyButton.classList.add('btn');
                replyButton.onclick = () => replyToComment(doc.id);
                actions.appendChild(replyButton);

                if (user && user.uid === comment.authorId) {
                    const editButton = document.createElement('button');
                    editButton.textContent = "Edit";
                    editButton.classList.add('btn');
                    editButton.onclick = () => editComment(doc.id, comment.text);
                    actions.appendChild(editButton);

                    const deleteButton = document.createElement('button');
                    deleteButton.textContent = "Delete";
                    deleteButton.classList.add('btn');
                    deleteButton.onclick = () => deleteComment(doc.id);
                    actions.appendChild(deleteButton);
                }

                commentElement.appendChild(actions);

                // Load replies
                const repliesList = document.createElement('div');
                repliesList.style.marginLeft = "20px";
                commentElement.appendChild(repliesList);

                const replies = localRepliesMap.get(doc.id) || [];
                replies.forEach((reply) => {
                    const replyElement = document.createElement('div');
                    replyElement.classList.add('comment-box');
                    replyElement.textContent = reply.text;
                    repliesList.appendChild(replyElement);
                });

                commentsList.appendChild(commentElement);
            });
        }

        function initListeners() {
            commentsCollection.orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                localComments = snapshot.docs;
                renderComments();
            }, (error) => {
                console.error("Error listening to comments: ", error);
            });

            db.collectionGroup("replies").orderBy("timestamp", "asc").onSnapshot((snapshot) => {
                localRepliesMap.clear();
                snapshot.forEach((replyDoc) => {
                    const reply = replyDoc.data();
                    const parentId = replyDoc.ref.parent.parent.id;
                    if (!localRepliesMap.has(parentId)) {
                        localRepliesMap.set(parentId, []);
                    }
                    localRepliesMap.get(parentId).push(reply);
                });
                renderComments();
            }, (error) => {
                console.error("Error listening to replies: ", error);
            });
        }

        let isInitialLoad = true;
        firebase.auth().onAuthStateChanged((user) => {
            if (isInitialLoad) {
                initListeners();
                isInitialLoad = false;
            } else {
                renderComments(); // Re-render if auth state changes (e.g. login)
            }
        });
    </script>
</body>
</html>
